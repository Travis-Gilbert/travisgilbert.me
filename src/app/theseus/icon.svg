<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Theseus icon">
  <!-- PCB -->
  <rect width="64" height="64" rx="8" fill="#0a2a20"/>

  <!-- silkscreen border -->
  <rect x="3" y="3" width="58" height="58" rx="6" fill="none" stroke="#d4c88a" stroke-width="0.6" stroke-dasharray="2 1.2"/>

  <!-- corner fiducials -->
  <g fill="#d4c88a">
    <circle cx="6"  cy="6"  r="0.9"/>
    <circle cx="58" cy="6"  r="0.9"/>
    <circle cx="6"  cy="58" r="0.9"/>
    <circle cx="58" cy="58" r="0.9"/>
  </g>

  <!-- traces from kernel to each peripheral chip -->
  <g stroke="#c9a23a" stroke-width="0.9" fill="none" stroke-linecap="square">
    <path d="M 16 14 L 16 24 L 26 24 L 26 28"/>
    <path d="M 48 14 L 48 24 L 38 24 L 38 28"/>
    <path d="M 9 32 L 24 32"/>
    <path d="M 55 32 L 40 32"/>
    <path d="M 16 50 L 16 40 L 26 40 L 26 36"/>
    <path d="M 48 50 L 48 40 L 38 40 L 38 36"/>
  </g>

  <!-- 6 peripheral chips (ingest, structure, relate, evaluate, revise, express) -->
  <g fill="#162f26" stroke="#d4c88a" stroke-width="0.55">
    <rect x="11"   y="9"  width="10" height="6" rx="0.6"/>
    <rect x="43"   y="9"  width="10" height="6" rx="0.6"/>
    <rect x="4"    y="29" width="6"  height="6" rx="0.6"/>
    <rect x="54"   y="29" width="6"  height="6" rx="0.6"/>
    <rect x="11"   y="49" width="10" height="6" rx="0.6"/>
    <rect x="43"   y="49" width="10" height="6" rx="0.6"/>
  </g>

  <!-- pin-1 dots -->
  <g fill="#d4c88a">
    <circle cx="12.2" cy="10.2" r="0.45"/>
    <circle cx="44.2" cy="10.2" r="0.45"/>
    <circle cx="5.2"  cy="30.2" r="0.45"/>
    <circle cx="55.2" cy="30.2" r="0.45"/>
    <circle cx="12.2" cy="50.2" r="0.45"/>
    <circle cx="44.2" cy="50.2" r="0.45"/>
  </g>

  <!-- central GRAPH die -->
  <g>
    <rect x="22" y="24" width="20" height="16" rx="0.8" fill="#162f26" stroke="#d4c88a" stroke-width="0.7"/>
    <circle cx="23.4" cy="25.4" r="0.5" fill="#d4c88a"/>
    <g stroke="#c9a23a" stroke-width="0.55" fill="none">
      <line x1="27" y1="29" x2="32" y2="32"/>
      <line x1="32" y1="32" x2="37" y2="29"/>
      <line x1="27" y1="29" x2="32" y2="36"/>
      <line x1="37" y1="29" x2="32" y2="36"/>
      <line x1="32" y1="32" x2="32" y2="36"/>
    </g>
    <g fill="#d4c88a">
      <circle cx="27" cy="29" r="1.1"/>
      <circle cx="37" cy="29" r="1.1"/>
      <circle cx="32" cy="32" r="1.3"/>
      <circle cx="32" cy="36" r="1.1"/>
    </g>
  </g>
</svg>
