<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="61" fill="#0F1012"/>
  <!-- Page outline (boosted opacity) -->
  <rect x="92" y="67" width="328" height="378" rx="12" fill="none" stroke="#FAF6F1" stroke-width="4" opacity="0.5"/>
  <!-- Fold corner -->
  <path d="M 359 67 L 359 128 L 420 128" stroke="#FAF6F1" stroke-width="3" fill="#0F1012" opacity="0.4"/>
  <!-- Progress strip at top of page (full opacity) -->
  <rect x="92" y="67" width="197" height="6" fill="#2D5F6B" rx="2"/>
  <!-- Text lines (boosted opacity + thicker) -->
  <line x1="123" y1="175" x2="389" y2="175" stroke="#FAF6F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="123" y1="215" x2="355" y2="215" stroke="#FAF6F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Active line (teal, full brightness) -->
  <line x1="123" y1="255" x2="400" y2="255" stroke="#2D5F6B" stroke-width="6" stroke-linecap="round"/>
  <!-- Cursor on active line -->
  <line x1="406" y1="241" x2="406" y2="269" stroke="#2D5F6B" stroke-width="4" stroke-linecap="round"/>
  <!-- More text lines -->
  <line x1="123" y1="295" x2="302" y2="295" stroke="#FAF6F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="123" y1="335" x2="345" y2="335" stroke="#FAF6F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="123" y1="375" x2="280" y2="375" stroke="#FAF6F1" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
</svg>
