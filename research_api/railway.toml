[build]
builder = "railpack"

[deploy]
# Startup sequence:
# 1. Download spaCy model (cached after first boot)
# 2. Run database migrations
# 3. Collect static files
# 4. Ensure superuser exists
# 5. Start RQ worker in background (3 queues: default, engine, ingestion)
# 6. Start gunicorn web server in foreground
#
# The RQ worker runs in the same container for simplicity.
# For production scale: create a second Railway service with just the worker.
#
# NOTE: Tesseract and related system packages are now installed via Railpack
# Apt env vars (RAILPACK_BUILD_APT_PACKAGES / RAILPACK_DEPLOY_APT_PACKAGES).

startCommand = "bash scripts/start_railway.sh"
