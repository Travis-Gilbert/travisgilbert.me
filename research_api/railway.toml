[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["python"]

[deploy]
startCommand = "python manage.py migrate notebook --fake zero && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py ensure_superuser && python manage.py seed_commonplace && gunicorn config.wsgi --bind 0.0.0.0:$PORT --access-logfile - --error-logfile -"
