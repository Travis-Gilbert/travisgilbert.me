[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["python"]

[deploy]
# spaCy model download runs at startup (not build) because nixpacks cmds
# did not persist the model to the runtime container. The conditional check
# skips the download if the model is already cached from a previous boot.
startCommand = "python -c \"import spacy; spacy.load('en_core_web_md')\" 2>/dev/null || python -m spacy download en_core_web_md && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py ensure_superuser && gunicorn config.wsgi --bind 0.0.0.0:$PORT --access-logfile - --error-logfile -"
