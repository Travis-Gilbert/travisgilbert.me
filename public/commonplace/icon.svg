  <circle cx="146" cy="293" r="16" fill="#C49A4A" opacity="0.9"/>
  <!-- Primary node: terracotta (top-left) -->
  <circle cx="185" cy="138" r="38" fill="#B45A2D"/>
  <circle cx="176" cy="129" r="11" fill="#FAF6F1" opacity="0.35"/>
  <!-- Primary node: teal (right) -->
  <circle cx="397" cy="229" r="44" fill="#2D5F6B"/>
  <circle cx="387" cy="219" r="13" fill="#FAF6F1" opacity="0.35"/>
  <!-- Primary node: gold (bottom) -->
  <circle cx="234" cy="411" r="36" fill="#C49A4A"/>
  <circle cx="226" cy="403" r="10" fill="#FAF6F1" opacity="0.35"/>
  <!-- Center crosshair -->
  <g stroke="#FAF6F1" stroke-width="3" stroke-linecap="round" opacity="0.35">
    <line x1="240" y1="256" x2="272" y2="256"/>
    <line x1="256" y1="240" x2="256" y2="272"/>
