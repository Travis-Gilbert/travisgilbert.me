name: Research API Docker Smoke

on:
  push:
    branches: ["main"]
    paths:
      - "research_api/**"
      - ".github/workflows/research-api-docker-smoke.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "research_api/**"
      - ".github/workflows/research-api-docker-smoke.yml"
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -f research_api/Dockerfile.web -t research-api-web:ci research_api

      - name: Build worker image
        run: docker build -f research_api/Dockerfile.worker -t research-api-worker:ci research_api

  runtime-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: research_api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: research_api/requirements/production.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/production.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run deployment smoke checks
        run: ./scripts/smoke_deploy.sh
