<div
  x-data="{ open: {{ open|default:'true' }} }"
  class="border border-border rounded-brand overflow-hidden {{ class }}"
>
  <button
    @click="open = !open"
    class="
      w-full flex items-center justify-between
      px-4 py-3 bg-parchment-alt/50
      border-0 cursor-pointer
      font-mono text-[11px] uppercase tracking-widest font-bold text-ink
    "
    type="button"
  >
    <span>{{ title }}</span>
    <span
      class="text-ink-muted transition-transform duration-200"
      :class="{ '-rotate-90': !open }"
    >
      <c-icon name="chevron-down" size="12" color="currentColor" />
    </span>
  </button>
  <div
    x-show="open"
    x-collapse
    class="px-4 py-4 border-t border-border"
  >
    {{ slot }}
  </div>
</div>
