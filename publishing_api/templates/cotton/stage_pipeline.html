<div x-data="{
       stages: {{ stages|default:'[]' }},
       current: '{{ current|default:'' }}',
       color: '{{ color|default:'#B45A2D' }}',
       get currentIdx() { return this.stages.indexOf(this.current); }
     }"
     class="flex items-center gap-0"
     x-show="stages.length > 0"
>
  <template x-for="(stage, i) in stages" :key="stage">
    <div class="flex items-center">
      {# Connector line (before every dot except the first) #}
      <div x-show="i > 0"
           class="h-[2px] w-5 transition-colors duration-200 rounded-sm"
           :style="i <= currentIdx
             ? 'background-color:' + color
             : 'background-color: var(--color-border)'"
      ></div>

      {# Stage dot + label group #}
      <div class="flex flex-col items-center gap-1 min-w-[40px]">
        {# Label (above dot) #}
        <span class="font-mono text-[9px] uppercase tracking-[0.08em] whitespace-nowrap transition-colors duration-200"
              :class="i === currentIdx ? 'font-bold' : 'font-normal'"
              :style="i === currentIdx
                ? 'color:' + color
                : i < currentIdx
                  ? 'color: var(--color-ink-muted)'
                  : 'color: var(--color-ink-light)'"
              x-text="stage"
        ></span>

        {# Dot #}
        <div class="relative flex items-center justify-center">
          <div class="w-3 h-3 rounded-full border-2 transition-all duration-200"
               :style="i < currentIdx
                 ? 'background-color:' + color + '; border-color:' + color
                 : i === currentIdx
                   ? 'background-color:' + color + '; border-color:' + color + '; box-shadow: 0 0 0 3px ' + color + '18, 0 0 8px ' + color + '20'
                   : 'background-color: transparent; border-color: var(--color-border)'"
          >
            {# Checkmark for completed #}
            <template x-if="i < currentIdx">
              <svg viewBox="0 0 12 12" class="absolute top-[1px] left-[1px] w-2 h-2">
                <path d="M2.5 6L5 8.5L9.5 3.5" fill="none" stroke="var(--color-cream)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>
</div>
